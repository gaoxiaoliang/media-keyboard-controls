<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #333;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 6px 0;
    }
    kbd {
      background: #e8e8e8;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 12px;
    }
    .note {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h2>Media Keyboard Controls</h2>
  <div class="row"><span>Play / Pause</span><kbd>P</kbd></div>
  <div class="row"><span>Back 10s</span><kbd>[</kbd></div>
  <div class="row"><span>Forward 10s</span><kbd>]</kbd></div>
  <p class="note">Shortcuts only work when the cursor is <strong>not</strong> in a text input field.</p>
</body>
</html>
